      "Authors@R": "c(person(\"Hiroshi\", \"Akima\", role = c(\"aut\", \"cph\"), comment = \"Fortran code (TOMS 760, 761, 697 and 433)\"), person(\"Albrecht\", \"Gebhardt\", role = c(\"aut\", \"cre\", \"cph\"), email = \"albrecht.gebhardt@aau.at\", comment = \"R port (interp*, bicubic* functions), bilinear code\"), person(\"Thomas\", \"Petzold\", role = c(\"ctb\", \"cph\"), comment = \"aspline function\"), person(\"Martin\", \"Maechler\", email=\"maechler@stat.math.ethz.ch\", role = c(\"ctb\", \"cph\"), comment = \"interp2xyz function + enhancements\"), person(\"YYYY Association for Computing Machinery, Inc.\", role = c(\"cph\"), comment = \"covers code from TOMS 760, 761, 697 and 433\") )",
      "Maintainer": "Albrecht Gebhardt <albrecht.gebhardt@aau.at>",
      "Description": "Several cubic spline interpolation methods of H. Akima for irregular and regular gridded data are available through this package, both for the bivariate case (irregular data: ACM 761, regular data: ACM 760) and univariate case (ACM 433 and ACM 697). Linear interpolation of irregular gridded data is also covered by reusing D. J. Renkas triangulation code which is part of Akimas Fortran code. A bilinear interpolator for regular grids was also added for comparison with the bicubic interpolator on regular grids. Please note that most of the functions are now also covered in package interp, which is a re-implementation from scratch under a free license.",
